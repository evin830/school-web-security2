<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>암호화 채팅</title>

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background-color: #f0f0f0;
        }

        h1 {
            text-align: center;
            margin-top: 20px;
        }

        .layout {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        .chat-container {
            width: 820px;
            height: 500px;
            border: 1px solid #ccc;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 10px 14px;
            background: #e9e9e9;
            border-radius: 10px;
            max-width: 70%;
        }

        .message-wrapper{
            display:flex;
            flex-direction:column;
            align-items:flex-start;
        }
        
        .message-name{
            font-size:12px;
            color:#666;
            font-weight:600;
            margin-left:12px;
            margin-bottom:4px;
        }

        .input-box {
            border-top: 1px solid #ccc;
            padding: 10px;
        }

        .input-box input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        #nicknameInput {
            width: 220px;
            padding: 8px;
            box-sizing: border-box;
        }
        
        #enterBtn {
            display: block;
            margin: 15px auto 0;
        }

        .member-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background: #444;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            z-index: 1001;
        }
        
        .member-panel {
            position: fixed;
            top: 0;
            right: -240px;
            width: 220px;
            height: 100%;
            background: white;
            border-left: 1px solid #ccc;
            box-shadow: -5px 0 15px rgba(0,0,0,.15);
        
            transition: right .3s;
        
            padding:20px;
            box-sizing:border-box;
        
            z-index:1000;
        }
        
        .member-panel.open{
            right:0;
        }
        
        .member-panel h3{
            font-weight:300;
            border-bottom:1px solid #ddd;
            padding-bottom:8px;
        }
        
        .member-panel ul{
            padding:0;
            margin:0;
        }
        
        .member-panel li{
            list-style:none;
            margin:8px 0;
            font-family:monospace;
        }
        
        .member-panel li::before{
            content:"> ";
            color:#888;
        }

        .whitelist_btn {
            position: fixed;
            top: 20px;
            right: 100px;
            padding: 8px 16px;
            background: skyblue;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 6px;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 20px;
            width: 300px;
            border-radius: 10px;
            text-align: center;
        }

        .link-box {
            margin-top: 10px;
            background: #eee;
            padding: 10px;
            display: none;
            word-break: break-all;
        }

        .WhitelistBox {
            width: 100%;
            height: 150px;
            border: 1px solid #ccc;
            border-radius: 5px;
            overflow-y: auto;
            overflow-x: hidden;
            text-align: left;
            box-sizing: border-box;
            padding: 8px;
        }

        .message a {
            color: #0066cc;
            text-decoration: underline;
            word-break: break-all;
        }
        
        .message a:hover {
            color: #004499;
        }

    </style>

    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>

<body>

<!-- 닉네임 모달 -->
<div id="nicknameModal" class="modal" style="display:none;">
    <div class="modal-content">
        <h2>닉네임 입력</h2>
        <input type="text" id="nicknameInput" placeholder="닉네임" maxlength="16">
        <button onclick="setNickname()">입장</button>
    </div>
</div>

<h1>암호화 채팅</h1>

<button class="member-btn" onclick="toggleMembers()">멤버</button>

<button id="whitelist-btn" class="whitelist_btn" style="display: none;" onclick="openWhitelistModal()">허용 인원</button>

<div class="layout">

    <div class="chat-container">
        <div class="chat-box" id="chatBox"></div>

        <div class="input-box">
            <input type="text" id="input" placeholder="메시지 입력">
        </div>
    </div>

    <div id="memberPanel" class="member-panel">
        <h3>접속자</h3>
        <ul id="userList"></ul>
    </div>

</div>

<!-- 로그인 모달 -->
<div class="modal" id="LoginModal" style="display: flex;">
    <div class="modal-content" style="height: 300;">
        <h2>로그인</h2>
        
        <input type="text" id="username" placeholder="아이디를 입력하세요">
        <p></p>
        <input type="password" id="password" placeholder="비밀번호를 입력하세요">
        <p></p>
        <button onclick="login()">로그인</button>

        <button onclick="openRegister()">회원가입</button>
    </div>
</div>

<!-- 회원가입 모달 -->
<div class="modal" id="RegisterModal">
    <div class="modal-content" style="height: 500;">
        <h2>회원가입</h2>
        
        <input type="text" id="makeUsername" placeholder="아이디 입력">
        <p></p>
        <input type="password" id="makePassword" placeholder="비밀번호 입력">
        <p></p>
        <input type="password" id="checkPassword" placeholder="비밀번호 확인">
        <p></p>
        <button onclick="Register()">가입</button>

        <button onclick="closeRegisterModal()">닫기</button>
    </div>
</div>

<!-- 화이트리스트 모달 -->
<div class="modal" id="WhitelistModal" >
    <div class="modal-content" style="height: 300;">
        <h2>화이트리스트 추가</h2>
        
        <input type="text" id="NWL" placeholder="아이디를 입력하세요">
        <p></p>
        <div id="WhitelistBox" class="WhitelistBox"></div>
        <p></p>
        <button onclick="PlusWhitelist()">추가</button>
        <button onclick="MinusWhitelist()">삭제</button>
        <button onclick="closeWhitelistModal()">닫기</button>
    </div>
</div>

<script>

const socket = io();
const SECRET_KEY = "my-secret-key";

document.getElementById("nicknameInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        setNickname();
    }
});

const input = document.getElementById("input");
const chatBox = document.getElementById("chatBox");
const userList = document.getElementById("userList");

let serverpassword = "";
let logined = false
let nickname = "";
let isJoined = false;
let currentUser = "";
let hostname = "";

/* ================= 닉네임 ================= */

async function setNickname() {

    const name = document.getElementById("nicknameInput").value.trim();

    // 내가 호스트인지 확인
    const hostResponse = await fetch("/is-host",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            username: currentUser
        })
    });

    const hostResult = await hostResponse.json();

    console.log(hostResult);

    // 호스트가 아니면 서버 비밀번호 입력
    if(!hostResult.isHost){

        const password = prompt("서버 비밀번호를 입력하세요.");

        const checkResponse = await fetch("/check-server-password",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                password: password
            })
        });

        const check = await checkResponse.json();

        if(!check.success){
            alert(check.message);
            return;
        }
    }

    if (name.length > 16) {
        return alert("닉네임은 최대 16자까지 가능합니다.");
    }

    nickname = name;

    socket.emit("set nickname", nickname);

    document.getElementById("nicknameModal").style.display = "none";

    isJoined = true;
}

/* ================= 메시지 전송 ================= */

input.addEventListener("keypress", (e) => {

    if (e.key !== "Enter") return;

    if (!isJoined) return alert("닉네임 먼저 입력");

    const text = input.value.trim();

    if (!text) return;

    const encrypted = CryptoJS.AES.encrypt(text, SECRET_KEY).toString();

    socket.emit("chat message", {
        name: nickname,
        msg: encrypted
    });

    input.value = "";
});

/* ================= 메시지 수신 ================= */

socket.on("chat message", (data) => {

    const decrypted = CryptoJS.AES.decrypt(
        data.msg,
        SECRET_KEY
    ).toString(CryptoJS.enc.Utf8);

    const div = document.createElement("div");

    div.className = "message";

    div.textContent = `${data.name}: ${decrypted}`;

    chatBox.appendChild(div);

    chatBox.scrollTop = chatBox.scrollHeight;
});

    function makeLinks(text) {
        const urlRegex = /(https?:\/\/[^\s]+)/g;
    
        return text.replace(urlRegex, (url) => {
            return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
        });
    }

/* ================= 접속자 ================= */

socket.on("user list", (users) => {

    userList.innerHTML = "";

    users.forEach(name => {

        const li = document.createElement("li");

        li.textContent = name;

        userList.appendChild(li);
    });

    // online [n] 표시
    document.querySelector("#memberPanel h3").textContent =
        `online [${users.length}]`;
});

/* ================= 멤버 ================= */

let memberOpen = false;

function toggleMembers(){

    memberOpen = !memberOpen;

    const panel = document.getElementById("memberPanel");

    if(memberOpen){
        panel.classList.add("open");
    }else{
        panel.classList.remove("open");
    }

}

/* =================== 로그인 ============= */

function openLoginModal() {
    document.getElementById("LoginModal").style.display = "flex";
}

async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const response = await fetch("/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username,
            password
        })
    });

    const result = await response.json();

    alert(result.message);

    if(result.success){
        const response = await fetch("/is-first-user");

        const data = await response.json();

        if(data.first){

            const serverPassword = prompt("서버 비밀번호를 설정하세요");

            await fetch("/sethost", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    host: username,
                    password: serverPassword
                })
            });
            document.getElementById("whitelist-btn").style.display = "flex";
        }
        currentUser = username;
        logined = true
        console.log("로그인 성공");
        console.log(currentUser);
        document.getElementById("nicknameModal").style.display = "flex";
        document.getElementById("LoginModal").style.display = "none";
    }

    
}

function openRegister() {
    document.getElementById("LoginModal").style.display = "none";
    document.getElementById("RegisterModal").style.display = "flex";
}

function closeLoginModal() {
    document.getElementById("LoginModal").style.display = "none";
}

/* =================== 회원가입 ============= */

function openRegisterModal() {
    document.getElementById("RegisterModal").style.display = "flex";
}

async function Register() {

    const username = document.getElementById("makeUsername").value;
    const password = document.getElementById("makePassword").value;
    const checkpassword = document.getElementById("checkPassword").value;

    const response = await fetch("/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username,
            password
        })
    });

    const result = await response.json();

    alert(result.message);

    document.getElementById("RegisterModal").style.display = "none";
    document.getElementById("LoginModal").style.display = "flex";
}

function closeRegisterModal() {
    document.getElementById("RegisterModal").style.display = "none";
    document.getElementById("LoginModal").style.display = "flex";
}

/* =================== 화이트리스트 ============= */

async function ShowWhitelist(){

    const response = await fetch("/GetWhitelist");

    const whitelist = await response.json();

    const box = document.getElementById("WhitelistBox");

    box.innerHTML = "";

    whitelist.forEach(user => {

        box.innerHTML += `
            <div>${user.NWL}</div>
        `;

    });

}

function openWhitelistModal() {
    document.getElementById("WhitelistModal").style.display = "flex";
    ShowWhitelist()
}

function closeWhitelistModal() {
    document.getElementById("WhitelistModal").style.display = "none";
}

async function PlusWhitelist() {

    const NWL = document.getElementById("NWL").value;

    const response = await fetch("/PlusWhitelist", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            NWL
        })
    });

    const result = await response.json();

    ShowWhitelist()
    alert(result.message);
}

async function MinusWhitelist() {
    
    const NWL = document.getElementById("NWL").value;

    const response = await fetch("/MinusWhitelist", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            NWL
        })
    });

    const result = await response.json();

    ShowWhitelist()
    alert(result.message);
}

/* ================= Tab으로 멤버 패널 열기/닫기 ================= */

document.addEventListener("keydown", (e) => {
    if (e.key === "Tab") {
        e.preventDefault(); // 기본 Tab 포커스 이동 방지
        toggleMembers();
    }
});

</script>

</body>
</html>
