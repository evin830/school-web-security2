<script>

const socket=io();
const SECRET_KEY="my-secret-key";

let nickname="";
let joined=false;
let currentRoom="public";
let memberOpen=false;
let selectedRoom=null;

const bannedWords=[
    "욕설"
];

/* =========================
Elements
========================= */

let currentUser="";
const isAdmin=()=>currentUser==="admin";

const nicknameModal=document.getElementById("nicknameModal");
const nicknameInput=document.getElementById("nicknameInput");
const enterBtn=document.getElementById("enterBtn");

const lobbyPage=document.getElementById("lobbyPage");
const chatPage=document.getElementById("chatPage");

const roomList=document.getElementById("roomList");

const publicChat=document.getElementById("publicChat");
const publicInput=document.getElementById("publicInput");

const chatBox=document.getElementById("chatBox");
const input=document.getElementById("input");

const currentRoomTitle=document.getElementById("currentRoom");

const memberPanel=document.getElementById("memberPanel");
const userList=document.getElementById("userList");

const createRoomBtn=document.getElementById("createRoomBtn");

const createRoomModal=document.getElementById("createRoomModal");
const roomNameInput=document.getElementById("roomNameInput");
const roomCodeInput=document.getElementById("roomCodeInput");
const createRoomConfirm=document.getElementById("createRoomConfirm");
const createRoomCancel=document.getElementById("createRoomCancel");

const joinRoomModal=document.getElementById("joinRoomModal");
const joinRoomTitle=document.getElementById("joinRoomTitle");
const joinRoomCode=document.getElementById("joinRoomCode");
const joinRoomConfirm=document.getElementById("joinRoomConfirm");
const joinRoomCancel=document.getElementById("joinRoomCancel");

const backBtn=document.getElementById("backBtn");
    
const onlineBtn=document.getElementById("onlineBtn");
const onlinePanel=document.getElementById("onlinePanel");
const onlineList=document.getElementById("onlineList");
let onlineOpen=false;

const helpBtn=document.getElementById("helpBtn");
const helpModal=document.getElementById("helpModal");
const helpClose=document.getElementById("helpClose");

const blacklistModal=document.getElementById("blacklistModal");

const blacklistInput=document.getElementById("blacklistInput");

const blacklistList=document.getElementById("blacklistList");

const addBlacklist=document.getElementById("addBlacklist");

const removeBlacklist=document.getElementById("removeBlacklist");

const closeBlacklist=document.getElementById("closeBlacklist");

const blacklistBtn=document.getElementById("blacklistBtn");
const loginModal=document.getElementById("loginModal");
const registerModal=document.getElementById("registerModal");

const loginId=document.getElementById("loginId");
const loginPw=document.getElementById("loginPw");

const registerId=document.getElementById("registerId");
const registerPw=document.getElementById("registerPw");
const registerPw2=document.getElementById("registerPw2");

const loginBtn=document.getElementById("loginBtn");
const registerBtn=document.getElementById("registerBtn");

const openRegisterBtn=document.getElementById("openRegisterBtn");
const closeRegisterBtn=document.getElementById("closeRegisterBtn");


/* =========================
회원가입
========================= */

openRegisterBtn.onclick=()=>{

    loginModal.style.display="none";

    registerModal.style.display="flex";

};

closeRegisterBtn.onclick=()=>{

    registerModal.style.display="none";

    loginModal.style.display="flex";

};

registerBtn.onclick=async()=>{

    if(registerPw.value!==registerPw2.value){

        alert("비밀번호가 일치하지 않습니다.");

        return;

    }

    const response=await fetch("/register",{

        method:"POST",

        headers:{

            "Content-Type":"application/json"

        },

        body:JSON.stringify({

            username:registerId.value,

            password:registerPw.value

        })

    });

    const result=await response.json();

    alert(result.message);

    if(result.success){

        registerModal.style.display="none";

        loginModal.style.display="flex";

    }

};

loginBtn.onclick=async()=>{

    const response=await fetch("/login",{

        method:"POST",

        headers:{

            "Content-Type":"application/json"

        },

        body:JSON.stringify({

            username:loginId.value,

            password:loginPw.value

        })

    });

    const result=await response.json();

    alert(result.message);

    if(result.success){

        currentUser=loginId.value;

        if(isAdmin()){

            blacklistBtn.style.display="inline-block";

        }

        socket.emit(

            "login user",

            currentUser

        );

        loginModal.style.display="none";

        nicknameModal.style.display="flex";

    }

};

/* =========================
닉네임
========================= */

document.getElementById("nicknameInput").addEventListener("keydown",e=>{

    if(e.key==="Enter"){
        setNickname();
    }

});


document.getElementById("enterBtn").onclick=setNickname;

function setNickname(){
    const name=document
        .getElementById("nicknameInput")
        .value
        .trim();

    if(!name){
        alert("닉네임을 입력하세요.");
        return;
    }

    if(name.length>16){
        alert("닉네임은 최대 16자입니다.");
        return;
    }

    nickname=name;
    // 서버에서 중복 확인 후 입장 처리
    
    socket.emit(
        "set nickname",
        {
            username: currentUser,
            nickname: nicknameInput.value.trim()
        }
    );

}

socket.on("nickname fail",msg=>{
    alert(msg);
});

socket.on("nickname success",()=>{

    document
    .getElementById("nicknameModal")
    .style.display="none";

    joined=true;

    socket.emit(
        "request rooms"
    );

});

/* =========================
방 만들기
========================= */

roomNameInput.addEventListener("keydown",e=>{

    if(e.key==="Enter"){
        createRoomConfirm.click();
    }

});

roomCodeInput.addEventListener("keydown",e=>{

    if(e.key==="Enter"){
        createRoomConfirm.click();
    }

});

createRoomBtn.onclick=()=>{

    createRoomModal.style.display="flex";

    roomNameInput.focus();

};

createRoomCancel.onclick=()=>{

    createRoomModal.style.display="none";

};

createRoomConfirm.onclick=()=>{

    const roomName=roomNameInput.value.trim();
    const roomCode=roomCodeInput.value.trim();

    if(!roomName){
        return alert("방 이름을 입력하세요.");
    }

    if(roomCode !== "" && !/^\d+$/.test(roomCode)){
        return alert("방 코드는 숫자만 가능합니다.");
    }

    socket.emit("create room",{
        name:roomName,
        code:roomCode
    });

};

socket.on("create fail",msg=>{

    alert(msg);

});

socket.on("room created",id=>{

    createRoomModal.style.display="none";

    // 입력한 방 코드를 지우기 전에 저장
    const code = roomCodeInput.value.trim();

    roomNameInput.value="";
    roomCodeInput.value="";

    socket.emit("join room",{
        id:id,
        code:code
    });

});

roomNameInput.addEventListener("keydown", e => {

    if(e.key === "Tab"){

        e.preventDefault(); // 기본 Tab 이동 막기

        roomCodeInput.focus(); // 방 코드 칸으로 이동

    }

});

/* =========================
방 목록
========================= */

socket.on("room list",rooms=>{

    roomList.innerHTML="";

    rooms.forEach(room=>{

        const div=document.createElement("div");

        div.className="room";

        div.innerHTML=`
            <span class="room-name">${room.name}</span>
            <span class="room-count">[${room.count}]</span>
        `;

        div.onclick = () => {
        
            // 비밀번호가 없는 방이면 바로 입장
            if(!room.locked){
                socket.emit("join room",{
                    id: room.id
                });
                return;
            }
        
            // 비밀번호 있는 방
            selectedRoom = room;
        
            joinRoomTitle.textContent = room.name;
        
            joinRoomCode.value = "";
        
            joinRoomModal.style.display = "flex";
        
            joinRoomCode.focus();
        
        };

        roomList.appendChild(div);

    });

});

/* =========================
방 입장
========================= */

joinRoomConfirm.onclick=()=>{

    socket.emit("join room",{
        id:selectedRoom.id,
        code:joinRoomCode.value.trim()
    });

};

joinRoomCancel.onclick=()=>{

    joinRoomModal.style.display="none";

};

socket.on("join fail",()=>{

    alert("방에 입장할 수 없습니다.");

});

socket.on("join success",room=>{

    currentRoom=room.code;

    currentRoomTitle.textContent=room.name;

    joinRoomModal.style.display="none";

    lobbyPage.style.display="none";

    chatPage.style.display="block";

    chatBox.innerHTML="";

    input.focus();

});

/* =========================
뒤로가기
========================= */

backBtn.onclick=()=>{

    socket.emit("leave room");

    currentRoom="public";

    chatPage.style.display="none";

    lobbyPage.style.display="block";

};

/* =========================
공용 채팅 전송
========================= */

publicInput.addEventListener("keydown",e=>{

    if(e.key!=="Enter") return;


    const text=publicInput.value.trim();


    if(!text) return;



    // =========================
    // 귓속말
    // 사용법: /w 닉네임 내용
    // =========================

    if(text.startsWith("/w ")){

        const args=text.split(" ");


        if(args.length < 3){

            alert("사용법: /w 닉네임 내용");

            return;

        }


        socket.emit("whisper",{

            target:args[1],

            msg:CryptoJS.AES.encrypt(
                args.slice(2).join(" "),
                SECRET_KEY
            ).toString()

        });


        publicInput.value="";

        return;

    }



    // =========================
    // 일반 공용 채팅
    // =========================

    const encrypted=CryptoJS.AES.encrypt(
        text,
        SECRET_KEY
    ).toString();


    socket.emit("chat message",{

        room:"public",
        msg:encrypted

    });


    publicInput.value="";


});

/* =========================
Dark Mode
========================= */

function checkCommands(text,isMine){

    const command=text.trim().toLowerCase();

    if(!isMine) return;

    if(command==="dark mode"){
        document.body.classList.add("dark-mode");
    }

    if(command==="light mode"){
        document.body.classList.remove("dark-mode");
    }

}

/* =========================
금칙어
========================= */

function censorText(text){

    let result=text;

    bannedWords.forEach(word=>{

        const regex=new RegExp(word,"gi");

        result=result.replace(
            regex,
            "*".repeat(word.length)
        );

    });

    return result;

}

/* =========================
URL 자동 링크
========================= */

function makeLinks(text){

    const urlRegex=/(https?:\/\/[^\s]+)/g;

    return text.replace(urlRegex,url=>{

        return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;

    });

}

/* =========================
채팅 수신 (최종)
========================= */

function sendWhisper(text){

    const args=text.split(" ");

    if(args.length < 3) return false;

    const target=args[1];

    const message=args.slice(2).join(" ");

    const encrypted=CryptoJS.AES.encrypt(
        message,
        SECRET_KEY
    ).toString();


    socket.emit("whisper",{
        target:target,
        msg:encrypted
    });


    return true;
}

socket.on("chat message",data=>{

    const decrypted=CryptoJS.AES.decrypt(
        data.msg,
        SECRET_KEY
    ).toString(CryptoJS.enc.Utf8);

    if(!decrypted) return;

    const command=decrypted.trim().toLowerCase();

    /* ---------- 다크모드 ---------- */

    if(data.sender===socket.id){

        if(command==="dark mode"){
            document.body.classList.add("dark-mode");
        }

        if(command==="light mode"){
            document.body.classList.remove("dark-mode");
        }

    }

    /* ---------- Top Secret ---------- */

    if(command==="top secret"){

        document.body.style.background="#000";
        document.body.style.color="#00ff00";

        const easter=document.createElement("div");

        easter.textContent="CLASSIFIED FILE OPENED";

        easter.style.position="fixed";
        easter.style.left="50%";
        easter.style.top="50%";
        easter.style.transform="translate(-50%,-50%)";
        easter.style.fontSize="48px";
        easter.style.fontFamily="monospace";
        easter.style.color="red";
        easter.style.textShadow="0 0 15px red";
        easter.style.zIndex="9999";

        document.body.appendChild(easter);

        setTimeout(()=>{

            easter.remove();

            document.body.style.background="";

            document.body.style.color="";

        },5000);

    }

    const message=makeLinks(
        censorText(decrypted)
    );

    /* ---------- 공용 ---------- */

    if(data.room==="public"){

        const box=document.createElement("div");

        box.className="public-message";

        box.innerHTML=`
            <div class="public-name">${data.name}</div>
            <div class="public-text">${message}</div>
        `;

        publicChat.appendChild(box);

        publicChat.scrollTop=publicChat.scrollHeight;

        return;

    }

    /* ---------- 방 ---------- */

    const wrapper=document.createElement("div");

    wrapper.className="message-wrapper";

    const name=document.createElement("div");

    name.className="message-name";

    name.textContent=data.name;

    const msg=document.createElement("div");

    msg.className="message";

    console.log(data.whisper);
    
    if(data.whisper){
    
        msg.style.background="#f3e8ff";
        msg.innerHTML=message;
    
    }else{
    
        msg.innerHTML=message;
    
    }

    msg.innerHTML=message;

    wrapper.appendChild(name);
    wrapper.appendChild(msg);

    chatBox.appendChild(wrapper);

    chatBox.scrollTop=chatBox.scrollHeight;

});

    blacklistModal.style.display="flex";

async function refreshBlacklist(){

    const res=await fetch("/GetBlacklist");

    const list=await res.json();

    blacklistList.innerHTML="";

    list.forEach(user=>{

        const li=document.createElement("li");

        li.textContent=user.username;

        blacklistList.appendChild(li);

    });

}
