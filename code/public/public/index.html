<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>암호화 채팅</title>

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background-color: #f0f0f0;
        }

        h1 {
            text-align: center;
            margin-top: 20px;
        }

        .layout {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        .chat-container {
            width: 600px;
            height: 500px;
            border: 1px solid #ccc;
            background: white;
            display: flex;
            flex-direction: column;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 10px 14px;
            background: #e9e9e9;
            border-radius: 10px;
            max-width: 70%;
        }

        .input-box {
            border-top: 1px solid #ccc;
            padding: 10px;
        }

        input {
            width: 95%;
            padding: 10px;
        }

        .user-list {
            width: 200px;
            height: 500px;
            background: white;
            border: 1px solid #ccc;
            padding: 10px;
        }

        .invite-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 6px;
        }

        .Login_btn {
            position: fixed;
            top: 20px;
            right: 100px;
            padding: 8px 16px;
            background: skyblue;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 6px;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 20px;
            width: 300px;
            border-radius: 10px;
            text-align: center;
        }

        .link-box {
            margin-top: 10px;
            background: #eee;
            padding: 10px;
            display: none;
            word-break: break-all;
        }


    </style>

    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>

<body>

<!-- 닉네임 모달 -->
<div id="nicknameModal" class="modal" style="display:none;">
    <div class="modal-content">
        <h2>닉네임 입력</h2>
        <input type="text" id="nicknameInput" placeholder="닉네임">
        <button onclick="setNickname()">입장</button>
    </div>
</div>

<h1>암호화 채팅</h1>

<button class="invite-btn" onclick="openInviteModal()">초대</button>

<button id="Register-btn" class="Login_btn" onclick="openRegisterModal()">회원가입</button>

<div class="layout">

    <div class="chat-container">
        <div class="chat-box" id="chatBox"></div>

        <div class="input-box">
            <input type="text" id="input" placeholder="메시지 입력">
        </div>
    </div>

    <div class="user-list">
        <h3>접속자</h3>
        <ul id="userList"></ul>
    </div>

</div>

<!-- 로그인 모달 -->
<div class="modal" id="LoginModal" style="display: flex;">
    <div class="modal-content" style="height: 300;">
        <h2>로그인</h2>
        
        <input type="text" id="username" placeholder="아이디를 입력하세요">
        <p></p>
        <input type="password" id="password" placeholder="비밀번호를 입력하세요">
        <p></p>
        <button onclick="login()">로그인</button>

        <button onclick="openRegister()">회원가입</button>

        <button onclick="closeLoginModal()">닫기</button>
    </div>
</div>

<!-- 회원가입 모달 -->
<div class="modal" id="RegisterModal">
    <div class="modal-content" style="height: 500;">
        <h2>회원가입</h2>
        
        <input type="text" id="makeUsername" placeholder="아이디 입력">
        <p></p>
        <input type="password" id="makePassword" placeholder="비밀번호 입력">
        <p></p>
        <input type="password" id="checkPassword" placeholder="비밀번호 확인">
        <p></p>
        <button onclick="Register()">가입</button>

        <button onclick="closeRegisterModal()">닫기</button>
    </div>
</div>

<!-- 초대 모달 -->
<div class="modal" id="inviteModal">
    <div class="modal-content">
        <h2>초대 링크</h2>

        <button onclick="createInvite()">링크 생성</button>

        <div id="linkArea" class="link-box"></div>

        <button id="copyBtn" style="display:none;" onclick="copyLink()">복사</button>

        <button onclick="closeInviteModal()">닫기</button>
    </div>
</div>

<script>

const socket = io();
const SECRET_KEY = "my-secret-key";

const input = document.getElementById("input");
const chatBox = document.getElementById("chatBox");
const userList = document.getElementById("userList");

let serverpassword = "";
let logined = false
let nickname = "";
let isJoined = false;
let currentUser = "";
let hostname = "";

/* ================= 닉네임 ================= */

async function setNickname() {

    const name = document.getElementById("nicknameInput").value.trim();

    // 내가 호스트인지 확인
    const hostResponse = await fetch("/is-host",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            username: currentUser
        })
    });

    const hostResult = await hostResponse.json();

    console.log(hostResult);

    // 호스트가 아니면 서버 비밀번호 입력
    if(!hostResult.isHost){

        const password = prompt("서버 비밀번호를 입력하세요.");

        const checkResponse = await fetch("/check-server-password",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                password: password
            })
        });

        const check = await checkResponse.json();

        if(!check.success){
            alert(check.message);
            return;
        }
    }

    if (!name) return alert("닉네임 입력");

    nickname = name;

    socket.emit("set nickname", nickname);

    document.getElementById("nicknameModal").style.display = "none";

    isJoined = true;
}

/* ================= 메시지 전송 ================= */

input.addEventListener("keypress", (e) => {

    if (e.key !== "Enter") return;

    if (!isJoined) return alert("닉네임 먼저 입력");

    const text = input.value.trim();

    if (!text) return;

    const encrypted = CryptoJS.AES.encrypt(text, SECRET_KEY).toString();

    socket.emit("chat message", {
        name: nickname,
        msg: encrypted
    });

    input.value = "";
});

/* ================= 메시지 수신 ================= */

socket.on("chat message", (data) => {

    const decrypted = CryptoJS.AES.decrypt(
        data.msg,
        SECRET_KEY
    ).toString(CryptoJS.enc.Utf8);

    const div = document.createElement("div");

    div.className = "message";

    div.textContent = `${data.name}: ${decrypted}`;

    chatBox.appendChild(div);

    chatBox.scrollTop = chatBox.scrollHeight;
});

/* ================= 접속자 ================= */

socket.on("user list", (users) => {

    userList.innerHTML = "";

    users.forEach(name => {

        const li = document.createElement("li");

        li.textContent = name;

        userList.appendChild(li);
    });
});

/* ================= 초대 ================= */

let currentLink = "";

function openInviteModal() {
    document.getElementById("inviteModal").style.display = "flex";
}

function closeInviteModal() {
    document.getElementById("inviteModal").style.display = "none";
}

function createInvite() {

    const code = Math.random().toString(36).substring(2, 10);

    currentLink = `${location.origin}/chat/${code}`;

    document.getElementById("linkArea").style.display = "block";
    document.getElementById("copyBtn").style.display = "block";

    document.getElementById("linkArea").textContent = currentLink;
}

function copyLink() {
    navigator.clipboard.writeText(currentLink);
    alert("복사 완료");
}

/* =================== 로그인 ============= */

function openLoginModal() {
    document.getElementById("LoginModal").style.display = "flex";
}

async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const response = await fetch("/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username,
            password
        })
    });

    const result = await response.json();

    alert(result.message);

    if(result.success){
        const response = await fetch("/is-first-user");

        const data = await response.json();

        if(data.first){

            const serverPassword = prompt("서버 비밀번호를 설정하세요");

            await fetch("/sethost", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    host: username,
                    password: serverPassword
                })
            });
        }
        currentUser = username;
        logined = true
        console.log("로그인 성공");
        console.log(currentUser);
        document.getElementById("nicknameModal").style.display = "flex";
        document.getElementById("LoginModal").style.display = "none";
        document.getElementById("Register-btn").style.display = "none";
    }

    
}

function openRegister() {
    document.getElementById("LoginModal").style.display = "none";
    document.getElementById("RegisterModal").style.display = "flex";
}

function closeLoginModal() {
    document.getElementById("LoginModal").style.display = "none";
}

/* =================== 회원가입 ============= */

function openRegisterModal() {
    document.getElementById("RegisterModal").style.display = "flex";
}

async function Register() {

    const username = document.getElementById("makeUsername").value;
    const password = document.getElementById("makePassword").value;
    const checkpassword = document.getElementById("checkPassword").value;

    const response = await fetch("/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username,
            password
        })
    });

    const result = await response.json();

    alert(result.message);

    document.getElementById("RegisterModal").style.display = "none";
    document.getElementById("LoginModal").style.display = "flex";
}

function closeRegisterModal() {
    document.getElementById("RegisterModal").style.display = "none";
    document.getElementById("LoginModal").style.display = "flex";
}

</script>

</body>
</html>
